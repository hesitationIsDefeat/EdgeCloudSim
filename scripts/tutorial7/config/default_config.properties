#default config file
simulation_time=10
warm_up_period=1
file_log_enabled=true
deep_file_log_enabled=false

#logging is disabled if it is 0
vm_load_check_interval=0.1

#logging is disabled if it is 0
location_check_interval=0.1

#logging is disabled if it is 0
ap_delay_check_interval=0

min_number_of_mobile_devices=50
max_number_of_mobile_devices=400
mobile_device_counter_size=50

wan_propagation_delay=0.1
lan_internal_delay=0.005
wlan_bandwidth=300
wan_bandwidth=15
gsm_bandwidth=0

#all the host on cloud runs on a single datacenter
number_of_host_on_cloud_datacenter=1
number_of_vm_on_cloud_host=4
core_for_cloud_vm=4
mips_for_cloud_vm=100000
ram_for_cloud_vm=32000
storage_for_cloud_vm=1000000

#mobile devices has no processing unit in this scenario
core_for_mobile_vm=0
mips_for_mobile_vm=0
ram_for_mobile_vm=0
storage_for_mobile_vm=0

#use ',' for multiple values 
#orchestrator_policies=RANDOM_FIT,WORST_FIT,BEST_FIT,FIRST_FIT,NEXT_FIT
orchestrator_policies=WORST_FIT

#use ',' for multiple values
simulation_scenarios=DEFAULT_SCENARIO

#mean waiting time in seconds
attractiveness_L1_mean_waiting_time=500
attractiveness_L2_mean_waiting_time=300
attractiveness_L3_mean_waiting_time=120

# ONAT: Used for edge mobility
northern_bound=500
southern_bound=0
eastern_bound=500
western_bound=0

# ONAT: use ',' for multiple values
uav_mobility_options=LOCAL

# ONAT: use ',' for multiple values
task_partition_options=NO,FULL


